<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">🚀 My Tasks</h2>

    <form action="/add" method="post" class="d-flex mb-3">
        <input type="text" name="task" class="form-control me-2" placeholder="Enter task..." required>
        <button class="btn btn-primary">Add</button>
    </form>

    <ul class="list-group">
        {% for task in tasks %}
        <li class="list-group-item d-flex justify-content-between">
            {{ task }}
            <a href="/delete/{{ loop.index0 }}" class="btn btn-danger btn-sm">Delete</a>
        </li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
