<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">🚀 My Tasks</h2>

    <!-- Add Task Form -->
    <form action="/add" method="post" class="d-flex mb-3">
        <input type="text" name="task" class="form-control me-2" placeholder="Enter task..." required>
        <button class="btn btn-primary">Add</button>
    </form>

    <!-- Task List -->
    <ul class="list-group">
        {% for task in tasks %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            
            <!-- Task Content -->
            <span>{{ task.content }}</span>

            <!-- Delete Button -->
            <a href="/delete/{{ task.id }}" class="btn btn-danger btn-sm">Delete</a>
        
        </li>
        {% else %}
        <!-- If no tasks -->
        <li class="list-group-item text-center text-muted">
            No tasks added yet 🚫
        </li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
